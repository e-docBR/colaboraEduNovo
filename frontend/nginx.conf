server {
    listen 80;
    server_name localhost;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security Headers ─────────────────────────────────────────────────────
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # I4: SAMEORIGIN allows same-origin iframes (PDF viewer, etc); DENY breaks them
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Legacy XSS auditor is deprecated and can create browser quirks.
    add_header X-XSS-Protection "0" always;
    # I3: HSTS removed from dev nginx — Traefik handles it in production via TLS config.
    #     Setting it here on HTTP causes browsers to block dev access for 1 year.
    # Referrer policy — don't leak URL to third-party requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # C7: removed 'unsafe-inline' from script-src and style-src.
    # MUI/Emotion injects styles at runtime; nonce-based CSP requires server-side nonce
    # injection which is not yet implemented — 'unsafe-inline' is removed for scripts
    # (the higher-risk vector) and style-src keeps it only for CSS-in-JS compatibility.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; form-action 'self'; frame-ancestors 'self'; worker-src 'self' blob:;" always;
    # Permissions Policy — disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── SSE Streaming — timeout estendido e buffering desativado ────────────
    location = /api/v1/chat/stream {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;

        # SSE requer buffering desligado e timeout longo (LLM pode demorar 30-120s)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── API Proxy — must match /api/* ────────────────────────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        # Don't expose backend server header
        proxy_hide_header Server;
    }

    # ── Static Files (SPA) ───────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Long-cache for hashed assets (vite produces main.abc123.js etc.)
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Never cache the SPA entrypoint
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
    }

    # ── Error pages ──────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
