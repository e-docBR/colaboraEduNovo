services:
  # ─── Docker Socket Proxy (security: isolates Docker socket from Traefik) ────
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    environment:
      CONTAINERS: 1
      SERVICES: 0
      TASKS: 0
      NETWORKS: 0
      VOLUMES: 0
      IMAGES: 0
      INFO: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket_network

  traefik:
    image: traefik:v2.10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "letsencrypt:/letsencrypt"
    networks:
      - app_network
      - socket_network
    depends_on:
      - socket-proxy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_app_user.sh:/docker-entrypoint-initdb.d/10_init_app_user.sh:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1001:1001"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      FLASK_APP: app
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APP_DATABASE_URL: postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGHOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ALLOWED_ORIGINS: '["https://${DOMAIN}"]'
      UPLOAD_FOLDER: /data/uploads
      FRONTEND_URL: https://${DOMAIN}
      BRAND_NAME: ${BRAND_NAME:-ColaboraEdu}
      # SMTP — obrigatório para recuperação de senha
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # WhatsApp (opcional)
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-}
      # Monitoramento e faturamento (opcionais)
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
    volumes:
      - ./data:/data
    command:
      - gunicorn
      - --bind=0.0.0.0:5000
      - --workers=4
      - --threads=4
      - --worker-class=gthread
      - --timeout=120
      - --keep-alive=5
      - --max-requests=1000
      - --max-requests-jitter=100
      - --access-logfile=-
      - --error-logfile=-
      - "app:create_app()"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.routers.backend.middlewares=security-headers"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
      # Security headers at the edge
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.backend-http.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1001:1001"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
    command: [
      "rq", "worker", "default",
      "--url", "redis://:${REDIS_PASSWORD}@redis:6379/0",
      "--result-ttl", "86400",
      "--failure-ttl", "604800",
      "--max-jobs", "500"
    ]
    environment:
      FLASK_APP: app
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # Worker usa APP_DB_USER (privilégios mínimos: DML apenas, sem DDL)
      DATABASE_URL: postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APP_DATABASE_URL: postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      UPLOAD_FOLDER: /data/uploads
      BRAND_NAME: ${BRAND_NAME:-ColaboraEdu}
      SMTP_SERVER: ${SMTP_SERVER}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./data:/data
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend.middlewares=security-headers"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"
    depends_on:
      - backend
    networks:
      - app_network

  # ─── Monitoramento ─────────────────────────────────────────────────────────
  # MONITOR_BASICAUTH must be set in .env as a htpasswd string.
  # Generate with: echo $(htpasswd -nb admin yourpassword) | sed -e 's/\$/\$\$/g'
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monitoring.rule=Host(`monitor.${DOMAIN}`)"
      - "traefik.http.routers.monitoring.entrypoints=websecure"
      - "traefik.http.routers.monitoring.tls.certresolver=myresolver"
      - "traefik.http.routers.monitoring.middlewares=monitor-auth,security-headers"
      - "traefik.http.services.monitoring.loadbalancer.server.port=3001"
      - "traefik.http.routers.monitoring-http.rule=Host(`monitor.${DOMAIN}`)"
      - "traefik.http.routers.monitoring-http.entrypoints=web"
      - "traefik.http.routers.monitoring-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.monitor-auth.basicauth.users=${MONITOR_BASICAUTH}"

  # ─── Backup PostgreSQL ──────────────────────────────────────────────────────
  # Usa crond do Alpine para garantir execução exata às 02:00 independente de
  # quando o container iniciar.  Para backup em Object Storage, montar um
  # bucket S3-compatible em /backups.
  pgbackup:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    entrypoint: >
      sh -c "
        echo '[pgbackup] Installing rclone and gnupg...';
        apk add --no-cache rclone gnupg > /dev/null 2>&1 || echo '[pgbackup] optional packages unavailable';

        echo 'ColaboraEdu pgbackup started — scheduling daily cron at 02:00';

        cat > /usr/local/bin/run_backup.sh << 'SCRIPT'
        #!/bin/sh
        set -e
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
        # Enforce encrypted backups — refuse to create unencrypted dumps
        if [ -z "$$BACKUP_ENCRYPTION_KEY" ]; then
          echo \"[pgbackup] ❌ FATAL: BACKUP_ENCRYPTION_KEY not set — refusing to create unencrypted backup\"
          exit 1
        fi
        FILENAME=/backups/backup_$${TIMESTAMP}.sql.gz.gpg
        echo \"[pgbackup] Starting encrypted backup -> $$FILENAME\"
        pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB \
          | gzip \
          | gpg --batch --symmetric --cipher-algo AES256 --passphrase "$$BACKUP_ENCRYPTION_KEY" \
          > \"$$FILENAME\"
        if [ $$? -eq 0 ]; then
          SIZE=$$(stat -c%s \"$$FILENAME\" 2>/dev/null || echo 0)
          if [ \"$$SIZE\" -lt 1024 ]; then
            echo \"[pgbackup] FAILED: dump too small ($${SIZE} bytes) — removing\"
            rm -f \"$$FILENAME\"
            exit 1
          fi
          echo \"[pgbackup] OK: $$FILENAME ($${SIZE} bytes)\"
          find /backups -name 'backup_*.sql.gz*' -mtime +30 -delete
          if [ -n \"$$S3_BACKUP_BUCKET\" ] && command -v rclone > /dev/null 2>&1; then
            echo \"[pgbackup] Uploading to s3:$$S3_BACKUP_BUCKET ...\"
            rclone copy \"$$FILENAME\" \":s3:$$S3_BACKUP_BUCKET\" \
              --s3-access-key-id=\"$$AWS_ACCESS_KEY_ID\" \
              --s3-secret-access-key=\"$$AWS_SECRET_ACCESS_KEY\" \
              --s3-region=\"$${AWS_DEFAULT_REGION:-us-east-1}\" \
              $${S3_ENDPOINT:+--s3-endpoint=$$S3_ENDPOINT} \
              && echo \"[pgbackup] S3 upload OK\" \
              || echo \"[pgbackup] S3 upload FAILED (local backup kept)\"
          fi
        else
          echo \"[pgbackup] FAILED: pg_dump returned non-zero\"
          rm -f \"$$FILENAME\"
          exit 1
        fi
        SCRIPT

        chmod +x /usr/local/bin/run_backup.sh;
        echo '0 2 * * * /usr/local/bin/run_backup.sh >> /proc/1/fd/1 2>&1' | crontab -;
        echo 'Cron scheduled. Running initial backup now to verify connectivity...';
        /usr/local/bin/run_backup.sh || echo '[pgbackup] Initial backup failed — check PGPASSWORD/postgres connectivity';
        crond -f -l 2
      "
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
    volumes:
      - pgbackups:/backups
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  app_network:
    driver: bridge
  socket_network:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  uptime_kuma_data:
  pgbackups:
