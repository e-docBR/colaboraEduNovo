name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

jobs:
  guard:
    name: Confirm deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "❌ Deployment cancelled — confirmation input must be 'deploy'."
          exit 1

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: guard
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='letsencrypt/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
              "bash -lc 'cd ${{ secrets.SERVER_PATH }} && \
               ./scripts/prod-preflight.sh && \
               (docker compose -f docker-compose.prod.yml pull 2>/dev/null || true) && \
               docker compose -f docker-compose.prod.yml up -d --build --remove-orphans --scale worker=3 && \
               docker compose -f docker-compose.prod.yml exec -T backend flask --app app db upgrade && \
               docker compose -f docker-compose.prod.yml ps && \
               docker image prune -f'"

      - name: Smoke test
        env:
          SMOKE_SUPERADMIN_USER: ${{ secrets.SMOKE_SUPERADMIN_USER }}
          SMOKE_SUPERADMIN_PASSWORD: ${{ secrets.SMOKE_SUPERADMIN_PASSWORD }}
          SMOKE_TENANT_SLUG: ${{ secrets.SMOKE_TENANT_SLUG }}
        run: |
          sleep 20
          BASE_URL="https://${{ secrets.DOMAIN }}"

          FRONTEND_STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/")
          if [ "$FRONTEND_STATUS" != "200" ]; then
            echo "❌ Frontend smoke failed — HTTP $FRONTEND_STATUS"
            exit 1
          fi
          echo "✅ / → 200"

          # 1. Health básico
          STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ /health → 200"

          DETAIL=$(curl -fsS "$BASE_URL/health")
          DB_STATUS=$(echo "$DETAIL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('checks',{}).get('database','unknown'))" 2>/dev/null || echo "parse_error")
          REDIS_STATUS=$(echo "$DETAIL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('checks',{}).get('redis','unknown'))" 2>/dev/null || echo "parse_error")
          echo "DB: $DB_STATUS | Redis: $REDIS_STATUS"
          if [ "$DB_STATUS" != "ok" ] || [ "$REDIS_STATUS" != "ok" ]; then
            echo "❌ Dependency check failed — DB=$DB_STATUS Redis=$REDIS_STATUS"
            exit 1
          fi

          TENANTS_STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/api/v1/auth/tenants")
          if [ "$TENANTS_STATUS" != "200" ]; then
            echo "❌ Tenant discovery smoke failed — HTTP $TENANTS_STATUS"
            exit 1
          fi
          echo "✅ /api/v1/auth/tenants → 200"

          if [ -n "${SMOKE_SUPERADMIN_USER:-}" ] && [ -n "${SMOKE_SUPERADMIN_PASSWORD:-}" ] && [ -n "${SMOKE_TENANT_SLUG:-}" ]; then
            LOGIN_STATUS=$(curl -sS -o /tmp/colabora-login.json -w "%{http_code}" \
              -X POST "$BASE_URL/api/v1/auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"${SMOKE_SUPERADMIN_USER}\",\"password\":\"${SMOKE_SUPERADMIN_PASSWORD}\",\"tenant_slug\":\"${SMOKE_TENANT_SLUG}\"}")
            if [ "$LOGIN_STATUS" != "200" ]; then
              echo "❌ Login smoke failed — HTTP $LOGIN_STATUS"
              cat /tmp/colabora-login.json
              exit 1
            fi
            echo "✅ /api/v1/auth/login → 200"
          else
            echo "ℹ️ Login smoke skipped — SMOKE_SUPERADMIN_* secrets ausentes"
          fi

          echo "✅ Deployed successfully — all smoke tests passed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed — check GitHub Actions logs."
          # Extend here with Slack/Telegram/email webhook if desired
