name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Security — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan repository for high-confidence secrets
        run: ./scripts/scan-secrets.sh

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        working-directory: backend
        run: ruff check app tests

  backend-audit:
    name: Backend — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            pkg-config \
            libcairo2-dev \
            libffi-dev \
            libxml2-dev \
            libxslt-dev \
            libpq-dev
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]" pip-audit
      - name: Audit Python packages
        working-directory: backend
        run: pip-audit

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      FLASK_ENV: test
      SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
      JWT_SECRET_KEY: ci-test-jwt-key-at-least-32-chars-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            pkg-config \
            libcairo2-dev \
            libffi-dev \
            libxml2-dev \
            libxslt-dev \
            libpq-dev
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run migrations
        working-directory: backend
        run: flask --app app db upgrade
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=45
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  backend-build:
    name: Backend — Docker Build
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (dry-run, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint

  frontend-audit:
    name: Frontend — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=moderate

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1

  # ─── Mobile ─────────────────────────────────────────────────────────────────
  mobile-lint:
    name: Mobile — Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        working-directory: mobile
        run: npm ci
      - name: Type check
        working-directory: mobile
        run: npm run lint

  mobile-audit:
    name: Mobile — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        working-directory: mobile
        run: npm ci
      - name: Audit
        working-directory: mobile
        # Expo currently reports a transitive uuid moderate advisory whose npm
        # suggested fix is a breaking Expo version change. Track it in the
        # production plan and keep CI blocking on high/critical issues.
        run: npm audit --audit-level=high

  production-config:
    name: Production — Compose Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build CI production env
        run: |
          cat > .env.ci-prod <<'EOF'
          DOMAIN=example.com
          ACME_EMAIL=admin@example.com
          MONITOR_BASICAUTH=admin:ci-basic-auth-hash
          POSTGRES_USER=colabora
          POSTGRES_PASSWORD=ci-postgres-password
          POSTGRES_DB=colabora
          APP_DB_USER=colabora_app
          APP_DB_PASSWORD=ci-app-password
          REDIS_PASSWORD=ci-redis-password
          FLASK_ENV=production
          SECRET_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_SECRET_KEY=bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          ENCRYPTION_KEY=dddddddddddddddddddddddddddddddd
          BACKUP_ENCRYPTION_KEY=cccccccccccccccccccccccccccccccc
          FRONTEND_URL=https://example.com
          SMTP_SERVER=smtp.example.com
          SMTP_PORT=587
          SMTP_USER=no-reply@example.com
          SMTP_PASSWORD=ci-smtp-password
          SMTP_FROM=no-reply@example.com
          ALLOWED_ORIGINS=["https://example.com"]
          EOF
      - name: Validate production compose
        run: ./scripts/prod-preflight.sh .env.ci-prod
